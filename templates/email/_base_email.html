<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>{% block subject %}{{ product_name|default:"ProtoPeek" }}{% endblock %}</title>
</head>
<body style="margin:0; padding:0; background:#f6f7fb; color:#1b1e30; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f6f7fb;">
        <tr>
            <td align="center" style="padding:24px 12px;">
                <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="width:100%; max-width:600px;">
                    <tr>
                        <td style="padding:4px 6px 16px;">
                            <span style="font-size:20px; font-weight:700; color:#5b5bd6; letter-spacing:-0.01em;">&#9680;&nbsp;ProtoPeek</span>
                        </td>
                    </tr>
                    <tr>
                        <td style="background:#ffffff; border:1px solid #dde1ee; border-radius:12px; padding:28px 28px 24px;">
                            {% block body %}{% endblock %}
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:18px 8px 8px; color:#5b6180; font-size:12px; line-height:1.6;">
                            <p style="margin:0 0 6px;">You're receiving this email from {{ product_name|default:"ProtoPeek" }}.</p>
                            <p style="margin:0;">Need help? Contact us at <a href="mailto:{{ support_email|default:'support@protopeek.app' }}" style="color:#5b5bd6; text-decoration:none;">{{ support_email|default:"support@protopeek.app" }}</a>.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
